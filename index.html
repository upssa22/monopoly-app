<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monopoly GO Manager - AR</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* تعريف باليت الألوان المطابقة للصفحة الأصلية */
        :root {
            --dark: #1C1C1C; /* لون الخلفية الداكن الأساسي */
            --light: #FFFFFF;
            --accent: #FFC300; /* لون الذهبي للفلتر النشط */
            --accent-hover: #D8A500;
            --send-bg: #D4EDDA; /* أخضر للإرسال */
            --receive-bg: #FFF3CD; /* أصفر للاستلام */
            --gold-card: #B8860B; /* بني ذهبي لاسم الكرت الذهبي */
        }
        
        body { background-color: var(--dark); color: var(--light); font-family: 'Segoe UI', sans-serif; }
        
        /* ترويسة مطابقة (H1) */
        .title-header { background-color: var(--dark); padding: 30px 10px; text-align: center; border-bottom: 1px solid #333; }
        .title-header h1 { font-size: 2.5rem; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; color: var(--light); }
        
        /* أقسام المحتوى */
        .content-section { max-width: 1200px; margin: 20px auto; padding: 20px; }
        .box-light { background: var(--light); color: var(--dark); border-radius: 8px; padding: 25px; margin-bottom: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .section-h2 { font-size: 1.5rem; font-weight: bold; margin-bottom: 20px; color: var(--dark); border-bottom: 2px solid #EEE; padding-bottom: 10px; }
        
        /* مطابقة الأزرار والفلاتر */
        .button.is-main { background-color: var(--dark); color: var(--light); border: 1px solid var(--light); border-radius: 20px; text-transform: uppercase; font-size: 0.8rem; }
        .button.is-main:hover { background-color: #333; color: var(--light); border-color: var(--light); }
        .button.is-main.is-active { background-color: var(--accent) !important; color: var(--dark) !important; border-color: var(--accent) !important; font-weight: bold; }
        
        /* مطابقة الجداول والمجموعات */
        .set-card-main { background: var(--light); color: var(--dark); border-radius: 8px; overflow: hidden; margin-bottom: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .set-h3 { background-color: var(--dark); color: var(--light); padding: 12px 20px; font-weight: bold; font-size: 1rem; text-transform: uppercase; display: flex; justify-content: space-between; }
        .table { width: 100%; margin: 0; font-size: 0.9rem; }
        .table th { background-color: #F1F3F5; color: var(--dark); font-weight: bold; text-align: center !important; }
        .table td { vertical-align: middle; text-align: center !important; }
        .table td.card-name { text-align: right !important; }
        
        /* مطابقة تلوين التبادلات */
        .send-cls { background-color: var(--send-bg) !important; font-weight: bold; color: #155724; }
        .receive-cls { background-color: var(--receive-bg) !important; font-weight: bold; color: #856404; }
        .gold-name-cls { color: var(--gold-card); font-weight: bold; }
        
        #loader { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; flex-direction:column; align-items:center; justify-content:center; }
    </style>
</head>
<body>

    <div id="loader"><div class="button is-loading is-large is-ghost is-inverted"></div><p class="has-text-white mt-3">جاري المزامنة...</p></div>

    <div class="title-header">
        <h1>مدير مجموعة كروت مونو بولي GO</h1>
    </div>

    <div class="content-section px-3">
        
        <div class="box-light">
            <h2 class="section-h2">إعدادات الحسابات والبيانات</h2>
            <div class="columns is-vcentered is-mobile is-multiline">
                <div class="column is-8-mobile is-6-tablet">
                    <input class="input is-rounded" id="accName" placeholder="اسم الحساب (مثال: الرئيسي)">
                </div>
                <div class="column is-4-mobile is-3-tablet">
                    <input type="file" id="csvInp" style="display:none" accept=".csv" onchange="handleCSV()">
                    <button class="button is-link is-rounded is-fullwidth" onclick="document.getElementById('csvInp').click()">رفع CSV</button>
                </div>
            </div>
            <button class="button is-main is-fullwidth mt-2 is-rounded" onclick="loadData()">تحديث وعرض البيانات</button>
        </div>

        <div class="box-light">
            <h2 class="section-h2">الفلاتر</h2>
            
            <div class="mb-4">
                <p class="has-text-weight-bold is-size-7 mb-2">نوع العرض:</p>
                <div class="buttons">
                    <button class="button is-main is-active" id="btn-all" onclick="setMainFilter('all')">الكل</button>
                    <button class="button is-main" id="btn-trade" onclick="setMainFilter('trade')">تبادلات ممكنة</button>
                    <button class="button is-main" id="btn-missing" onclick="setMainFilter('missing')">بطاقات ناقصة</button>
                    <button class="button is-main" id="btn-gold" onclick="setMainFilter('gold')">ذهبية فقط</button>
                </div>
            </div>

            <div>
                <p class="has-text-weight-bold is-size-7 mb-2">تصفية حسب الندرة (النجوم):</p>
                <div class="buttons">
                    <button class="button is-main is-active" id="star-0" onclick="setStarFilter(0)">الكل</button>
                    <button class="button is-main" id="star-1" onclick="setStarFilter(1)">⭐ 1</button>
                    <button class="button is-main" id="star-2" onclick="setStarFilter(2)">⭐⭐ 2</button>
                    <button class="button is-main" id="star-3" onclick="setStarFilter(3)">⭐⭐⭐ 3</button>
                    <button class="button is-main" id="star-4" onclick="setStarFilter(4)">⭐⭐⭐⭐ 4</button>
                    <button class="button is-main" id="star-5" onclick="setStarFilter(5)">⭐⭐⭐⭐⭐ 5</button>
                </div>
            </div>
        </div>

        <div id="tablesArea"></div>
    </div>

    <script>
        // --- ضع بيانات Supabase الخاصة بك هنا (التي وضعناها في الخطوة السابقة) ---
        const SB_URL = 'https://phdfdrrxeisdnjgrybvd.supabase.co'; 
        const SB_KEY = 'sb_publishable_sWVLmXEX4ABujvE60r6nAw_0otUcQOj';
        // -------------------------------------------------------------------------
        
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        
        let allData = [];
        let currentFilter = 'all'; 
        let currentStars = 0; 

        async function handleCSV() {
            const name = document.getElementById('accName').value;
            const file = document.getElementById('csvInp').files[0];
            if(!name || !file) return alert("يرجى كتابة اسم الحساب واختيار الملف");
            const reader = new FileReader();
            reader.onload = async (e) => {
                const rows = e.target.result.split('\n').slice(1);
                const dataToUpload = rows.map(row => {
                    const c = row.split(',');
                    if(c.length < 4) return null;
                    return { account_name: name, set_name: c[0].trim(), card_name: c[1].trim(), stars: parseInt(c[2]) || 1, count: parseInt(c[3]) || 0, is_gold: c[4]?.includes('Y') || false };
                }).filter(r => r !== null && r.card_name);
                await supabaseClient.from('user_cards').delete().eq('account_name', name);
                const { error } = await supabaseClient.from('user_cards').insert(dataToUpload);
                if(error) alert("خطأ: " + error.message);
                else { loadData(); }
            };
            reader.readAsText(file);
        }

        async function loadData() {
            document.getElementById('loader').style.display = 'flex';
            const { data } = await supabaseClient.from('user_cards').select('*');
            document.getElementById('loader').style.display = 'none';
            if(data) { allData = data; applyFiltersAndRender(); }
        }

        function setMainFilter(type) {
            currentFilter = type;
            ['all', 'trade', 'missing', 'gold'].forEach(t => document.getElementById('btn-'+t).classList.remove('is-active'));
            document.getElementById('btn-'+type).classList.add('is-active');
            applyFiltersAndRender();
        }

        function setStarFilter(stars) {
            currentStars = stars;
            for(let i=0; i<=5; i++) document.getElementById('star-'+i).classList.remove('is-active');
            document.getElementById('star-'+stars).classList.add('is-active');
            applyFiltersAndRender();
        }

        function applyFiltersAndRender() {
            const area = document.getElementById('tablesArea');
            area.innerHTML = "";
            const accounts = [...new Set(allData.map(d => d.account_name))];
            const sets = [...new Set(allData.map(d => d.set_name))];
            sets.forEach(setName => {
                let setHTML = '';
                const setCards = allData.filter(d => d.set_name === setName);
                const uniqueCardNames = [...new Set(setCards.map(d => d.card_name))];
                let visibleCardsCount = 0;
                uniqueCardNames.forEach(cardName => {
                    const cD = setCards.filter(c => c.card_name === cardName);
                    const iG = cD[0]?.is_gold;
                    const s = cD[0]?.stars || 1;
                    const cts = accounts.map(acc => cD.find(c => c.account_name === acc)?.count || 0);
                    const cT = cts.some(c => c >= 2) && cts.some(c => c === 0);
                    const iM = cts.some(c => c === 0);
                    let showCard = true;
                    if(currentFilter === 'trade' && !cT) showCard = false;
                    if(currentFilter === 'missing' && !iM) showCard = false;
                    if(currentFilter === 'gold' && !iG) showCard = false;
                    if(currentStars > 0 && s !== currentStars) showCard = false;
                    if(showCard) {
                        visibleCardsCount++;
                        setHTML += `<tr><td class="card-name ${iG?'gold-name-cls':''}">${cardName} <span class="has-text-grey">(${s}⭐)</span></td>${cts.map(n => `<td class="${cT&&n>=2?'send-cls':(cT&&n===0?'receive-cls':'')}">${n}</td>`).join('')}</tr>`;
                    }
                });
                if(visibleCardsCount > 0) { area.innerHTML += `<div class="set-card-main"><div class="set-h3"><span>${setName}</span><span>${visibleCardsCount} كروت</span></div><table class="table is-bordered is-striped"><thead><tr><th class="card-name">اسم الكرت</th>${accounts.map(a => `<th>${a.substring(0,6)}</th>`).join('')}</tr></thead><tbody>${setHTML}</tbody></table></div>`; }
            });
        }
        window.onload = loadData;
    </script>
</body>
</html>
