<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الإدارة | القاموس</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>body { font-family: system-ui, sans-serif; }</style>
</head>
<body class="bg-gray-800 text-white min-h-screen p-6">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-center text-yellow-400 mb-8">لوحة تحكم الإدارة (إضافة الكروت الأساسية)</h1>
        
        <div class="bg-gray-700 p-6 rounded-lg shadow-lg mb-8">
            <h2 class="text-xl font-bold mb-4 border-b border-gray-600 pb-2">إضافة كرت جديد للقاعدة الأساسية</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block mb-1 text-sm">اسم المجموعة (Set Name)</label>
                    <input type="text" id="setName" class="w-full p-2 rounded bg-gray-600 text-white border border-gray-500 focus:border-blue-500" placeholder="مثال: مجموعة 1">
                </div>
                <div>
                    <label class="block mb-1 text-sm">اسم الكرت (Card Name)</label>
                    <input type="text" id="cardName" class="w-full p-2 rounded bg-gray-600 text-white border border-gray-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block mb-1 text-sm">عدد النجوم (Stars)</label>
                    <select id="stars" class="w-full p-2 rounded bg-gray-600 text-white border border-gray-500">
                        <option value="1">⭐ 1</option>
                        <option value="2">⭐⭐ 2</option>
                        <option value="3">⭐⭐⭐ 3</option>
                        <option value="4">⭐⭐⭐⭐ 4</option>
                        <option value="5">⭐⭐⭐⭐⭐ 5</option>
                    </select>
                </div>
                <div class="flex items-center mt-6">
                    <input type="checkbox" id="isGold" class="w-5 h-5 mr-2">
                    <label for="isGold" class="ml-2 font-bold text-yellow-400">هل الكرت ذهبي؟</label>
                </div>
            </div>
            <button onclick="addMasterCard()" class="mt-6 w-full bg-blue-600 hover:bg-blue-700 font-bold py-3 rounded transition-colors">
                حفظ الكرت في قاعدة البيانات
            </button>
        </div>

        <div class="bg-gray-700 p-6 rounded-lg shadow-lg">
            <h2 class="text-xl font-bold mb-4 border-b border-gray-600 pb-2">الكروت المتوفرة حالياً في النظام</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-right">
                    <thead class="bg-gray-600 text-gray-300">
                        <tr>
                            <th class="p-3 rounded-tr">المجموعة</th>
                            <th class="p-3">اسم الكرت</th>
                            <th class="p-3">النجوم</th>
                            <th class="p-3">النوع</th>
                            <th class="p-3 rounded-tl">إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="masterCardsTable" class="divide-y divide-gray-600">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // ضع مفاتيح Supabase هنا
        const SB_URL = 'ضع_الرابط_هنا';
        const SB_KEY = 'ضع_المفتاح_هنا';
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        async function addMasterCard() {
            const setName = document.getElementById('setName').value;
            const cardName = document.getElementById('cardName').value;
            const stars = document.getElementById('stars').value;
            const isGold = document.getElementById('isGold').checked;

            if (!setName || !cardName) return alert("يرجى إدخال اسم المجموعة واسم الكرت!");

            const { error } = await supabase.from('master_cards').insert([{
                set_name: setName,
                card_name: cardName,
                stars: parseInt(stars),
                is_gold: isGold
            }]);

            if (error) alert("خطأ: " + error.message);
            else {
                document.getElementById('cardName').value = ''; // تفريغ الخانة للكرت التالي
                loadMasterCards();
            }
        }

        async function loadMasterCards() {
            const tbody = document.getElementById('masterCardsTable');
            tbody.innerHTML = '<tr><td colspan="5" class="text-center p-4">جاري التحميل...</td></tr>';
            
            const { data, error } = await supabase.from('master_cards').select('*').order('set_name', { ascending: true });
            
            if (error) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center text-red-500 p-4">${error.message}</td></tr>`;
                return;
            }

            tbody.innerHTML = data.map(card => `
                <tr class="hover:bg-gray-600 transition-colors">
                    <td class="p-3">${card.set_name}</td>
                    <td class="p-3 font-bold ${card.is_gold ? 'text-yellow-400' : ''}">${card.card_name}</td>
                    <td class="p-3">${'⭐'.repeat(card.stars)}</td>
                    <td class="p-3">${card.is_gold ? '<span class="bg-yellow-600 text-xs px-2 py-1 rounded">ذهبي</span>' : 'عادي'}</td>
                    <td class="p-3">
                        <button onclick="deleteCard(${card.id})" class="text-red-400 hover:text-red-300">حذف</button>
                    </td>
                </tr>
            `).join('');
        }

        async function deleteCard(id) {
            if(!confirm('هل تريد حذف هذا الكرت من النظام بالكامل؟')) return;
            await supabase.from('master_cards').delete().eq('id', id);
            loadMasterCards();
        }

        // تحميل الكروت عند فتح الصفحة
        window.onload = loadMasterCards;
    </script>
</body>
</html>
