<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الإدارة | القاموس</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>body { font-family: system-ui, sans-serif; }</style>
</head>
<body class="bg-gray-800 text-white min-h-screen p-6">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-center text-yellow-400 mb-8">لوحة تحكم الإدارة (القاموس الأساسي)</h1>
        
        <div class="bg-gray-700 p-6 rounded-lg shadow-lg mb-8 border border-yellow-500">
            <h2 class="text-xl font-bold mb-4 border-b border-gray-600 pb-2 text-yellow-400">الرفع الشامل (ملف اللعبة الأصلي MR17.CSV)</h2>
            <p class="text-sm text-gray-300 mb-4">
                الخطوة 1: اختر الملف. الخطوة 2: اضغط تأكيد ورفع.
            </p>
            
            <div class="flex flex-col gap-4">
                <div class="flex items-center gap-4 bg-gray-600 p-3 rounded">
                    <input type="file" id="csvMasterInp" accept=".csv" class="hidden" onchange="showFileName()">
                    <button onclick="document.getElementById('csvMasterInp').click()" class="bg-blue-600 hover:bg-blue-700 font-bold py-2 px-6 rounded transition-colors whitespace-nowrap">
                        1. اختر ملف CSV
                    </button>
                    <span id="fileNameDisplay" class="text-gray-300 font-mono text-sm">لم يتم اختيار ملف بعد...</span>
                </div>

                <div class="flex items-center gap-4">
                    <button onclick="processUpload()" id="uploadBtn" class="bg-green-600 hover:bg-green-700 font-bold py-2 px-6 rounded transition-colors w-full">
                        2. تأكيد ورفع البيانات 🚀
                    </button>
                    <button onclick="deleteAllCards()" class="bg-red-600 hover:bg-red-700 font-bold py-2 px-6 rounded transition-colors whitespace-nowrap">
                        مسح جميع الكروت ⚠️
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-gray-700 p-6 rounded-lg shadow-lg mb-8">
            <h2 class="text-xl font-bold mb-4 border-b border-gray-600 pb-2">إضافة كرت فردي يدوياً</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block mb-1 text-sm">اسم المجموعة</label>
                    <input type="text" id="setName" class="w-full p-2 rounded bg-gray-600 text-white border border-gray-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block mb-1 text-sm">اسم الكرت</label>
                    <input type="text" id="cardName" class="w-full p-2 rounded bg-gray-600 text-white border border-gray-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block mb-1 text-sm">النجوم</label>
                    <select id="stars" class="w-full p-2 rounded bg-gray-600 text-white border border-gray-500">
                        <option value="1">⭐ 1</option>
                        <option value="2">⭐⭐ 2</option>
                        <option value="3">⭐⭐⭐ 3</option>
                        <option value="4">⭐⭐⭐⭐ 4</option>
                        <option value="5">⭐⭐⭐⭐⭐ 5</option>
                        <option value="6">⭐⭐⭐⭐⭐⭐ 6</option>
                    </select>
                </div>
                <div class="flex items-center mt-6">
                    <input type="checkbox" id="isGold" class="w-5 h-5 mr-2">
                    <label for="isGold" class="ml-2 font-bold text-yellow-400">هل الكرت ذهبي؟</label>
                </div>
            </div>
            <button onclick="addMasterCard()" class="mt-6 w-full bg-blue-600 hover:bg-blue-700 font-bold py-2 rounded transition-colors">
                حفظ الكرت اليدوي
            </button>
        </div>

        <div class="bg-gray-700 p-6 rounded-lg shadow-lg">
            <div class="flex justify-between items-center mb-4 border-b border-gray-600 pb-2">
                <h2 class="text-xl font-bold">الكروت المتوفرة في القاموس</h2>
                <span id="totalCardsCount" class="bg-blue-600 text-white px-3 py-1 rounded text-sm font-bold">العدد: 0</span>
            </div>
            <div class="overflow-x-auto h-96 overflow-y-auto">
                <table class="w-full text-right relative">
                    <thead class="bg-gray-600 text-gray-300 sticky top-0">
                        <tr>
                            <th class="p-3">المجموعة</th>
                            <th class="p-3">اسم الكرت</th>
                            <th class="p-3">النجوم</th>
                            <th class="p-3">النوع</th>
                            <th class="p-3">إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="masterCardsTable" class="divide-y divide-gray-600">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // --------- ضع مفاتيحك هنا ---------
        const SB_URL = 'https://upssa22.github.io/monopoly-app/admin.html???';
        const SB_KEY = 'sb_publishable_sWVLmXEX4ABujvE60r6nAw_0otUcQOj';
        // ----------------------------------
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        // دالة لعرض اسم الملف بعد اختياره
        function showFileName() {
            const file = document.getElementById('csvMasterInp').files[0];
            const display = document.getElementById('fileNameDisplay');
            if (file) {
                display.innerText = "الملف المختار: " + file.name;
                display.classList.replace('text-gray-300', 'text-green-400');
            } else {
                display.innerText = "لم يتم اختيار ملف بعد...";
                display.classList.replace('text-green-400', 'text-gray-300');
            }
        }

        // دالة معالجة الرفع (تعمل عند ضغط زر التأكيد)
        async function processUpload() {
            const file = document.getElementById('csvMasterInp').files[0];
            if (!file) {
                alert("يرجى اختيار ملف CSV أولاً من الخطوة 1!");
                return;
            }

            const btn = document.getElementById('uploadBtn');
            btn.innerText = "جاري المعالجة...";
            btn.classList.add("opacity-50", "cursor-not-allowed");
            btn.disabled = true;

            Papa.parse(file, {
                skipEmptyLines: true,
                complete: async function(results) {
                    try {
                        const rows = results.data;
                        const cardsToInsert = [];
                        let currentSet = "مجموعة غير معروفة";

                        if (rows.length < 2) {
                            alert("الملف فارغ أو لا يحتوي على كروت!");
                            resetBtn(btn);
                            return;
                        }

                        // القراءة تبدأ من الصف الثاني لتجاهل صف العناوين (Set,Sticker,Stars,Count)
                        for (let i = 1; i < rows.length; i++) {
                            const cols = rows[i];
                            
                            if (cols.length >= 3) {
                                // تنظيف النصوص
                                let setNameStr = cols[0] ? cols[0].replace(/\r?\n|\r/g, ' ').trim() : "";
                                let cardName = cols[1] ? cols[1].replace(/\r?\n|\r/g, ' ').trim() : "";
                                let starsStr = cols[2] ? cols[2].trim() : "";
                                
                                if (setNameStr !== "") {
                                    currentSet = setNameStr;
                                }

                                if (cardName !== "") {
                                    // النجوم الذهبية في ملفك هي 🌟 والعادية ⭐
                                    const starsCount = [...starsStr].filter(c => c === '⭐' || c === '🌟').length || 1;
                                    const isGold = starsStr.includes('🌟');
                                    
                                    cardsToInsert.push({
                                        set_name: currentSet,
                                        card_name: cardName,
                                        stars: starsCount,
                                        is_gold: isGold
                                    });
                                }
                            }
                        }

                        alert(`تم تحليل الملف بنجاح! وجدنا ${cardsToInsert.length} كرت. جاري إرسالها لقاعدة البيانات...`);

                        if (cardsToInsert.length === 0) {
                            alert("لم نتمكن من استخراج كروت من الملف. تأكد من صيغة الملف.");
                            resetBtn(btn);
                            return;
                        }

                        btn.innerText = "جاري الحفظ في السحابة...";
                        
                        // الإرسال لقاعدة البيانات
                        const { error } = await supabase.from('master_cards').insert(cardsToInsert);
                        
                        resetBtn(btn);
                        
                        if (error) {
                            alert("فشل الحفظ في قاعدة البيانات! تأكد من إيقاف (Disable RLS) للجدول. تفاصيل الخطأ:\n" + error.message);
                        } else {
                            alert("نجاح! تم رفع جميع الكروت لقاعدة البيانات.");
                            // مسح حقل الملف لتجنب رفعه مرتين بالخطأ
                            document.getElementById('csvMasterInp').value = '';
                            showFileName();
                            loadMasterCards();
                        }
                    } catch (err) {
                        alert("حدث خطأ غير متوقع أثناء المعالجة: " + err.message);
                        resetBtn(btn);
                    }
                },
                error: function(error) {
                    alert("فشل المتصفح في قراءة الملف: " + error.message);
                    resetBtn(btn);
                }
            });
        }

        function resetBtn(btn) {
            btn.innerText = "2. تأكيد ورفع البيانات 🚀";
            btn.classList.remove("opacity-50", "cursor-not-allowed");
            btn.disabled = false;
        }

        async function deleteAllCards() {
            if(!confirm('هل أنت متأكد تماماً من رغبتك في حذف جميع الكروت من النظام؟')) return;
            const { error } = await supabase.from('master_cards').delete().gt('id', 0);
            if(error) alert("خطأ في الحذف: " + error.message);
            else {
                alert("تم مسح القاموس بنجاح.");
                loadMasterCards();
            }
        }

        async function addMasterCard() {
            const setName = document.getElementById('setName').value;
            const cardName = document.getElementById('cardName').value;
            const stars = document.getElementById('stars').value;
            const isGold = document.getElementById('isGold').checked;

            if (!setName || !cardName) return alert("يرجى إدخال اسم المجموعة واسم الكرت!");

            const { error } = await supabase.from('master_cards').insert([{
                set_name: setName, card_name: cardName, stars: parseInt(stars), is_gold: isGold
            }]);

            if (error) alert("خطأ: " + error.message);
            else {
                document.getElementById('cardName').value = ''; 
                alert("تمت إضافة الكرت بنجاح.");
                loadMasterCards();
            }
        }

        async function loadMasterCards() {
            const tbody = document.getElementById('masterCardsTable');
            tbody.innerHTML = '<tr><td colspan="5" class="text-center p-4">جاري التحميل من السحابة...</td></tr>';
            
            const { data, error } = await supabase.from('master_cards').select('*').order('id', { ascending: true });
            
            if (error) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center text-red-500 p-4">لم نتمكن من جلب البيانات. الرجاء التأكد من تعطيل (Disable RLS) في Supabase.<br>تفاصيل: ${error.message}</td></tr>`;
                return;
            }

            document.getElementById('totalCardsCount').innerText = `العدد: ${data.length}`;

            if(data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center p-4 text-gray-400">القاموس فارغ حالياً. قم برفع الملف للبدء.</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(card => `
                <tr class="hover:bg-gray-600 transition-colors border-b border-gray-600">
                    <td class="p-3">${card.set_name}</td>
                    <td class="p-3 font-bold ${card.is_gold ? 'text-yellow-400' : ''}">${card.card_name}</td>
                    <td class="p-3">${'⭐'.repeat(card.stars)}</td>
                    <td class="p-3">${card.is_gold ? '<span class="bg-yellow-600 text-xs px-2 py-1 rounded">ذهبي</span>' : '<span class="text-gray-400 text-xs">عادي</span>'}</td>
                    <td class="p-3">
                        <button onclick="deleteCard(${card.id})" class="text-red-400 hover:text-red-300 bg-red-900 bg-opacity-30 px-2 py-1 rounded">حذف</button>
                    </td>
                </tr>
            `).join('');
        }

        async function deleteCard(id) {
            if(!confirm('هل تريد حذف هذا الكرت؟')) return;
            await supabase.from('master_cards').delete().eq('id', id);
            loadMasterCards();
        }

        window.onload = loadMasterCards;
    </script>
</body>
</html>
